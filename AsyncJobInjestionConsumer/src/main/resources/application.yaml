server:
  port: 8082

spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: async-job-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: jobRequest:com.anurag.AsyncJobInjestionConsumer.DTO.JobRequest
      auto-offset-reset: earliest
  application:
    name: async-job-ingestion-consumer
  datasource:
    url: jdbc:mysql://localhost:3306/job
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
logging:
  level:
    org.springframework.kafka: DEBUG
    org.apache.kafka: INFO
    com.anurag.AsyncJobInjestionConsumer: DEBUG